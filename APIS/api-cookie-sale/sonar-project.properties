sonar.projectKey=default-projects-npx_api-node

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=default-projects-npx_api-node
sonar.projectDescription="Default Project Structure for Node API"
sonar.projectVersion=1.0

sonar.language=js

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src
sonar.exclusions=src/tests/**,node_modules/*,coverage/lcov-report/*
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8
